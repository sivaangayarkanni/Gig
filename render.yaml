services:
  - type: web
    name: moltbot-backend
    runtime: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: moltbot_app
      - key: CORS_ORIGINS
        value: "*"
      - key: EMERGENT_API_KEY
        sync: false
      - key: EMERGENT_BASE_URL
        value: https://integrations.emergentagent.com/llm

  - type: static
    name: moltbot-frontend
    region: oregon
    buildCommand: cd frontend && yarn install && REACT_APP_BACKEND_URL=https://moltbot-backend.onrender.com yarn build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

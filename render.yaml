services:
  - type: web
    name: moltbot-backend
    runtime: python
    rootDir: backend
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: moltbot_app
      - key: CORS_ORIGINS
        value: "*"
      - key: EMERGENT_API_KEY
        sync: false
      - key: EMERGENT_BASE_URL
        value: https://integrations.emergentagent.com/llm

  - type: static
    name: moltbot-frontend
    rootDir: frontend
    region: oregon
    buildCommand: yarn install && yarn build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
